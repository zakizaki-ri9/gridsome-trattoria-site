# ── セキュリティ設定 ──

# ビルドスクリプト（postinstall等）の許可リスト
# pnpm v10 ではデフォルトで全パッケージのライフサイクルスクリプトがブロックされる
allowBuilds:
  esbuild: true
  sharp: true

# 検疫期間: 公開から7日（10,080分）経過していないバージョンのインストールをブロック
minimumReleaseAge: 10080

# ビルドツール・画像処理など、リリース頻度が高く上記制限に頻繁に引っかかる公式/メジャー系を除外
minimumReleaseAgeExclude:
  - 'esbuild'
  - '@esbuild/*'
  - '@emnapi/*'
  - 'rollup'
  - '@rollup/*'
  - 'vite'
  - '@vitejs/*'
  - 'astro'
  - '@astrojs/*'
  - 'sharp'
  - '@img/*'

# 信頼度ダウングレード防止
trustPolicy: no-downgrade
